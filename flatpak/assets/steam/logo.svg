<?xml version="1.0" encoding="UTF-8"?>
<!-- Steam library LOGO overlay (transparent). 900x400. Rendered to steam/logo.png and installed as
     grid/<appid>_logo.png. No background fill — Steam composites this over the hero. -->
<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Noto Sans',sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fe0d4"/><stop offset="1" stop-color="#38b2ac"/>
    </linearGradient>
  </defs>

  <!-- logo mark -->
  <g transform="translate(150,150)">
    <rect x="-96" y="-96" width="192" height="192" rx="42" fill="#23262e" stroke="#3a3f4b" stroke-width="2"/>
    <rect x="-60" y="-50" width="120" height="78" rx="12" fill="#0e1013"/>
    <rect x="-59.5" y="-49.5" width="119" height="77" rx="11.5" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.92"/>
    <path d="M-30 -26 L27 -11 L-30 4 Z" fill="url(#accent)"/>
    <rect x="-7" y="28" width="14" height="16" fill="#3a3f4b"/>
    <rect x="-28" y="44" width="56" height="11" rx="5.5" fill="#4a505e"/>
  </g>

  <!-- wordmark -->
  <text x="278" y="176" font-size="104" font-weight="800" fill="#f4f7fa" letter-spacing="1">Deckback</text>
  <rect x="280" y="212" width="150" height="6" rx="3" fill="url(#accent)"/>
  <text x="282" y="270" font-size="34" fill="#aeb7c4" letter-spacing="0.5">Living-room video for Steam Deck</text>
</svg>
