<?xml version="1.0" encoding="UTF-8"?>
<!-- Steam library HERO background banner. 1920x620. Rendered to steam/hero.png and installed as
     grid/<appid>_hero.png. The _logo.png is overlaid by Steam, so keep the right side clear. -->
<svg width="1920" height="620" viewBox="0 0 1920 620" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Noto Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c202a"/><stop offset="0.6" stop-color="#12151c"/><stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fe0d4"/><stop offset="1" stop-color="#38b2ac"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#2f6d68" stop-opacity="0.5"/><stop offset="1" stop-color="#2f6d68" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="620" fill="url(#bg)"/>
  <rect width="1920" height="620" fill="url(#glow)"/>

  <!-- faint tile grid on the left for texture -->
  <g opacity="0.10" fill="none" stroke="#7fd8cf" stroke-width="2">
    <rect x="120" y="150" width="300" height="180" rx="14"/>
    <rect x="120" y="360" width="300" height="180" rx="14"/>
    <rect x="450" y="150" width="300" height="180" rx="14"/>
  </g>

  <!-- big play mark, right of centre -->
  <g transform="translate(1290,310)">
    <circle r="140" fill="#0e1013" opacity="0.6"/>
    <circle r="140" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.85"/>
    <path d="M-46 -66 L82 0 L-46 66 Z" fill="url(#accent)"/>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="600" width="1920" height="20" fill="url(#accent)" opacity="0.9"/>
</svg>
