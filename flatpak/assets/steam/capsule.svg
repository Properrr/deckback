<?xml version="1.0" encoding="UTF-8"?>
<!-- Steam library PORTRAIT capsule (grid). 600x900. Rendered to steam/capsule.png and installed to
     userdata/<id>/config/grid/<appid>p.png by scripts/steam-artwork.py. On-brand, neutral. -->
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Noto Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#232734"/><stop offset="0.55" stop-color="#161a22"/><stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fe0d4"/><stop offset="1" stop-color="#38b2ac"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.5">
      <stop offset="0" stop-color="#2f6d68" stop-opacity="0.55"/><stop offset="1" stop-color="#2f6d68" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(300,300)">
    <rect x="-120" y="-120" width="240" height="240" rx="52" fill="#23262e" stroke="#3a3f4b" stroke-width="2"/>
    <rect x="-76" y="-62" width="152" height="98" rx="14" fill="#0e1013"/>
    <rect x="-75.5" y="-61.5" width="151" height="97" rx="13.5" fill="none" stroke="url(#accent)" stroke-width="3.5" opacity="0.92"/>
    <path d="M-38 -32 L34 -13 L-38 6 Z" fill="url(#accent)"/>
    <rect x="-8" y="36" width="16" height="18" fill="#3a3f4b"/>
    <rect x="-32" y="54" width="64" height="12" rx="6" fill="#4a505e"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="560" font-size="88" font-weight="800" fill="#f2f5f8" text-anchor="middle" letter-spacing="1">Deckback</text>
  <rect x="240" y="600" width="120" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="300" y="662" font-size="30" fill="#9aa3b1" text-anchor="middle">Living-room video</text>
  <text x="300" y="704" font-size="30" fill="#9aa3b1" text-anchor="middle">for Steam Deck</text>

  <!-- footer chip -->
  <rect x="196" y="806" width="208" height="46" rx="23" fill="#141821" stroke="#2c3644"/>
  <text x="300" y="836" font-size="22" fill="#6bd6cc" text-anchor="middle" letter-spacing="2">GAME MODE</text>
</svg>
