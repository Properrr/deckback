<?xml version="1.0" encoding="UTF-8"?>
<!-- README banner. 1280x340, self-contained dark background so it reads on any GitHub theme.
     Rendered to branding/readme-banner.png by render-assets.sh. -->
<svg width="1280" height="340" viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Noto Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c202a"/><stop offset="0.6" stop-color="#12151c"/><stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fe0d4"/><stop offset="1" stop-color="#38b2ac"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#2f6d68" stop-opacity="0.45"/><stop offset="1" stop-color="#2f6d68" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(150,150)">
    <rect x="-92" y="-92" width="184" height="184" rx="40" fill="#23262e" stroke="#3a3f4b" stroke-width="2"/>
    <rect x="-58" y="-48" width="116" height="76" rx="12" fill="#0e1013"/>
    <rect x="-57.5" y="-47.5" width="115" height="75" rx="11.5" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.92"/>
    <path d="M-29 -25 L26 -10 L-29 3 Z" fill="url(#accent)"/>
    <rect x="-7" y="28" width="14" height="15" fill="#3a3f4b"/>
    <rect x="-27" y="43" width="54" height="11" rx="5.5" fill="#4a505e"/>
  </g>

  <!-- wordmark -->
  <text x="288" y="150" font-size="82" font-weight="800" fill="#f4f7fa" letter-spacing="1">Deckback</text>
  <rect x="290" y="176" width="140" height="6" rx="3" fill="url(#accent)"/>
  <text x="292" y="224" font-size="27" fill="#aeb7c4">Living-room video for the Steam Deck — Game Mode native</text>

  <!-- feature chips -->
  <g font-size="18" fill="#8fd8d0">
    <rect x="290" y="252" width="220" height="42" rx="21" fill="#141b1b" stroke="#2c4a46"/>
    <text x="400" y="279" text-anchor="middle">Controller-native</text>
    <rect x="524" y="252" width="228" height="42" rx="21" fill="#141b1b" stroke="#2c4a46"/>
