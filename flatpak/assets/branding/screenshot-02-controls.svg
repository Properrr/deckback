<?xml version="1.0" encoding="UTF-8"?>
<!-- Neutral synthetic screenshot: Deckback's own on-screen controls card (the controller-mapping
     overlay the launcher injects). No third-party UI. 1280x800. Render to screenshots/02-controls.png. -->
<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Noto Sans',sans-serif">
  <defs>
    <linearGradient id="room2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141821"/><stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fd1c5"/><stop offset="1" stop-color="#38b2ac"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20242c"/><stop offset="1" stop-color="#171a20"/>
    </linearGradient>
  </defs>

  <!-- dimmed video behind -->
  <rect width="1280" height="800" fill="url(#room2)"/>
  <circle cx="640" cy="330" r="70" fill="none" stroke="#2b3138" stroke-width="4"/>
  <path d="M620 296 L672 330 L620 364 Z" fill="#2b3138"/>
  <rect width="1280" height="800" fill="#000" opacity="0.55"/>

  <!-- controls card -->
  <g>
    <rect x="290" y="150" width="700" height="500" rx="22" fill="url(#card)" stroke="#333b47"/>
    <rect x="290" y="150" width="700" height="6" rx="3" fill="url(#accent2)"/>

    <!-- header -->
    <rect x="330" y="192" width="34" height="34" rx="8" fill="#23262e" stroke="#3a3f4b"/>
    <rect x="337" y="200" width="20" height="14" rx="3" fill="#0e1013" stroke="url(#accent2)" stroke-width="1.5"/>
    <path d="M344 204 L351 207.5 L344 211 Z" fill="url(#accent2)"/>
    <text x="378" y="217" font-size="26" font-weight="800" fill="#f2f5f8">Controller</text>
    <text x="960" y="217" font-size="15" fill="#5b6472" text-anchor="end">Hold  &#9679;&#9679;&#9679;  to dismiss</text>
    <line x1="330" y1="244" x2="950" y2="244" stroke="#2a303a"/>

    <!-- mapping rows: left column -->
    <g font-size="19" fill="#cfd6df">
      <!-- A -->
      <circle cx="360" cy="292" r="17" fill="none" stroke="#4fd1c5" stroke-width="2.5"/>
      <text x="360" y="298" font-size="17" font-weight="700" fill="#4fd1c5" text-anchor="middle">A</text>
      <text x="392" y="298">Select / Play</text>
      <!-- B -->
      <circle cx="360" cy="344" r="17" fill="none" stroke="#f0857d" stroke-width="2.5"/>
      <text x="360" y="350" font-size="17" font-weight="700" fill="#f0857d" text-anchor="middle">B</text>
      <text x="392" y="350">Back</text>
      <!-- X -->
      <circle cx="360" cy="396" r="17" fill="none" stroke="#7aa2f0" stroke-width="2.5"/>
      <text x="360" y="402" font-size="17" font-weight="700" fill="#7aa2f0" text-anchor="middle">X</text>
      <text x="392" y="402">Details</text>
      <!-- Y -->
      <circle cx="360" cy="448" r="17" fill="none" stroke="#e8c15a" stroke-width="2.5"/>
      <text x="360" y="454" font-size="17" font-weight="700" fill="#e8c15a" text-anchor="middle">Y</text>
      <text x="392" y="454">Voice search</text>
      <!-- Menu -->
      <rect x="345" y="482" width="30" height="22" rx="5" fill="none" stroke="#8b95a3" stroke-width="2"/>
      <line x1="352" y1="489" x2="368" y2="489" stroke="#8b95a3" stroke-width="2"/>
      <line x1="352" y1="493" x2="368" y2="493" stroke="#8b95a3" stroke-width="2"/>
      <line x1="352" y1="497" x2="368" y2="497" stroke="#8b95a3" stroke-width="2"/>
      <text x="392" y="500">Home</text>
    </g>

    <!-- mapping rows: right column -->
    <g font-size="19" fill="#cfd6df">
      <!-- D-pad -->
      <g transform="translate(648,278)" stroke="#8b95a3" stroke-width="2" fill="none">
        <rect x="9" y="0" width="14" height="32" rx="3"/>
        <rect x="0" y="9" width="32" height="14" rx="3"/>
      </g>
      <text x="700" y="298">Navigate</text>
      <!-- LB/RB -->
      <rect x="646" y="332" width="40" height="20" rx="9" fill="none" stroke="#8b95a3" stroke-width="2"/>
      <text x="666" y="347" font-size="12" fill="#8b95a3" text-anchor="middle">LB</text>
      <rect x="694" y="332" width="40" height="20" rx="9" fill="none" stroke="#8b95a3" stroke-width="2"/>
      <text x="714" y="347" font-size="12" fill="#8b95a3" text-anchor="middle">RB</text>
      <text x="748" y="347">Skip &#177;10s</text>
      <!-- sticks -->
      <circle cx="666" cy="396" r="16" fill="none" stroke="#8b95a3" stroke-width="2"/>
      <circle cx="666" cy="396" r="6" fill="#8b95a3"/>
      <text x="700" y="402">Scroll / seek</text>
      <!-- Steam -->
      <circle cx="666" cy="448" r="16" fill="none" stroke="#4fd1c5" stroke-width="2"/>
      <text x="666" y="453" font-size="13" font-weight="700" fill="#4fd1c5" text-anchor="middle">&#9632;</text>
      <text x="700" y="454">Steam menu</text>
      <!-- View -->
      <rect x="651" y="482" width="30" height="22" rx="5" fill="none" stroke="#8b95a3" stroke-width="2"/>
      <rect x="657" y="488" width="18" height="10" rx="2" fill="none" stroke="#8b95a3" stroke-width="1.5"/>
      <text x="700" y="500">Toggle this card</text>
    </g>

    <!-- footer note -->
    <line x1="330" y1="540" x2="950" y2="540" stroke="#2a303a"/>
    <text x="640" y="588" font-size="18" fill="#8a93a1" text-anchor="middle">Every button is remapped at the launcher &#8212; no touchscreen needed.</text>
    <text x="640" y="618" font-size="15" fill="#5b6472" text-anchor="middle">Deckback &#183; Game Mode</text>
  </g>
</svg>
